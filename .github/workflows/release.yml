name: Release and Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # --- JOB 1: Create Release using Semantic Release (KHÔNG THAY ĐỔI) ---
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
      new_release_tag: ${{ steps.semantic.outputs.new_release_git_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # --- JOB 2: Build and Publish Public Release Assets ---
  build:
    name: Build & Publish Release Assets
    needs: release
    if: needs.release.outputs.new_release_published == 'true'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            build_command: npm run dist:linux
          - os: windows-latest
            build_command: npm run dist:win
          - os: macos-latest
            build_command: npm run dist:mac-x64
            mac_arch: x64
          - os: macos-latest
            build_command: npm run dist:mac-arm64
            mac_arch: arm64
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code at release tag
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.release.outputs.new_release_tag }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y xvfb rpm elfutils libopenjp2-tools

      - name: Start Xvfb
        if: runner.os == 'Linux'
        run: |
          Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Install node-gyp globally (Windows)
        if: runner.os == 'Windows'
        run: npm install -g node-gyp

      - name: Install all dependencies
        run: npm ci

      - name: Download and validate FFmpeg bundle
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run setup:binaries

      - name: Set package.json version
        run: npm version ${{ needs.release.outputs.new_release_version }} --no-git-tag-version

      - name: Build Application
        env:
          BUILD_COMMAND: ${{ matrix.build_command }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ runner.os }}" == "Linux" ]; then
            max_attempts=3
            attempt=1

            while [ "$attempt" -le "$max_attempts" ]; do
              if eval "$BUILD_COMMAND"; then
                break
              fi

              if [ "$attempt" -eq "$max_attempts" ]; then
                echo "Linux build failed after ${max_attempts} attempts."
                exit 1
              fi

              echo "Linux build attempt ${attempt}/${max_attempts} failed. Retrying in 15 seconds..."
              attempt=$((attempt + 1))
              rm -rf dist dist-electron
              sleep 15
            done
          else
            eval "$BUILD_COMMAND"
          fi
        shell: bash

      - name: Verify macOS packaged entrypoint
        if: runner.os == 'macOS'
        run: |
          app_path="$(find dist -maxdepth 2 -type d -name 'RecordSaaS.app' | head -n 1)"
          if [ -z "$app_path" ]; then
            echo "No macOS app bundle found under dist"
            exit 1
          fi

          app_asar="$app_path/Contents/Resources/app.asar"
          if [ ! -f "$app_asar" ]; then
            echo "Missing app.asar at $app_asar"
            exit 1
          fi

          node -e "const asar=require('@electron/asar'); const files=new Set(asar.listPackage(process.argv[1])); const unexpected=['/index.js','/app-x64.asar','/app-arm64.asar'].filter((file)=>files.has(file)); if (!files.has('/dist-electron/index.js')) { console.error('dist-electron/index.js is missing from app.asar'); process.exit(1); } if (unexpected.length > 0) { console.error('Unexpected universal wrapper files found in app.asar: ' + unexpected.join(', ')); process.exit(1); } const pkg=JSON.parse(asar.extractFile(process.argv[1],'package.json').toString('utf8')); if (pkg.main !== 'dist-electron/index.js') { console.error('Unexpected app.asar main entry: ' + pkg.main); process.exit(1); }" "$app_asar"
        shell: bash

      - name: Smoke test macOS app startup
        if: runner.os == 'macOS'
        run: |
          runner_arch="$(uname -m)"
          expected_arch=""

          case "${{ matrix.mac_arch }}" in
            x64)
              expected_arch="x86_64"
              ;;
            arm64)
              expected_arch="arm64"
              ;;
          esac

          if [ "$runner_arch" != "$expected_arch" ]; then
            echo "Skipping smoke test for ${{ matrix.mac_arch }} build on $runner_arch runner."
            exit 0
          fi

          app_path="$(find dist -maxdepth 2 -type d -name 'RecordSaaS.app' | head -n 1)"
          if [ -z "$app_path" ]; then
            echo "No macOS app bundle found under dist"
            exit 1
          fi

          executable="$app_path/Contents/MacOS/RecordSaaS"
          if [ ! -x "$executable" ]; then
            echo "App executable not found at $executable"
            exit 1
          fi

          smoke_log="$(mktemp)"
          "$executable" > "$smoke_log" 2>&1 &
          app_pid=$!
          sleep 15

          if ! ps -p "$app_pid" > /dev/null; then
            echo "RecordSaaS exited during smoke test"
            cat "$smoke_log"
            exit 1
          fi

          kill "$app_pid" || true
          wait "$app_pid" || true
        shell: bash

      - name: Verify built files
        run: ls -R
        shell: bash

      - name: Prepare public release assets
        id: public_assets
        run: |
          version="${{ needs.release.outputs.new_release_version }}"
          shopt -s nullglob

          fail_missing() {
            echo "$1" >&2
            exit 1
          }

          pick_one() {
            local label="$1"
            shift
            local matches=("$@")

            if [ ${#matches[@]} -eq 0 ]; then
              fail_missing "No ${label} asset candidate found in dist"
            fi

            if [ ${#matches[@]} -gt 1 ]; then
              printf 'Multiple %s asset candidates found:\n' "$label" >&2
              printf ' - %s\n' "${matches[@]}" >&2
              exit 1
            fi

            printf '%s\n' "${matches[0]}"
          }

          case "${{ runner.os }}" in
            Linux)
              appimage_source="$(pick_one 'Linux AppImage' dist/*.AppImage)"
              deb_source="$(pick_one 'Linux deb' dist/*.deb)"
              rpm_source="$(pick_one 'Linux rpm' dist/*.rpm)"
              zip_source="$(pick_one 'Linux zip' dist/*.zip)"

              appimage_target="dist/RecordSaaS-linux-v${version}.AppImage"
              deb_target="dist/RecordSaaS-linux-v${version}.deb"
              rpm_target="dist/RecordSaaS-linux-v${version}.rpm"
              zip_target="dist/RecordSaaS-linux-v${version}.zip"

              mv "$appimage_source" "$appimage_target"
              mv "$deb_source" "$deb_target"
              mv "$rpm_source" "$rpm_target"
              mv "$zip_source" "$zip_target"

              asset_paths=("$appimage_target" "$deb_target" "$rpm_target" "$zip_target")
              ;;
            macOS)
              source_file="$(pick_one 'macOS zip' dist/*.zip)"
              target_file="dist/RecordSaaSSetup-mac-${{ matrix.mac_arch }}-v${version}.zip"
              mv "$source_file" "$target_file"
              asset_paths=("$target_file")
              ;;
            Windows)
              source_file="$(pick_one 'Windows installer' dist/*.exe)"
              target_file="dist/RecordSaaSSetup-windows-v${version}.exe"
              mv "$source_file" "$target_file"
              asset_paths=("$target_file")
              ;;
            *)
              echo "Unsupported runner OS: ${{ runner.os }}"
              exit 1
              ;;
          esac

          printf 'Prepared public assets:\n'
          printf ' - %s\n' "${asset_paths[@]}"

          {
            echo "asset_paths<<EOF"
            printf '%s\n' "${asset_paths[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Publish assets to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          while IFS= read -r asset_path; do
            [ -n "$asset_path" ] || continue
            gh release upload ${{ needs.release.outputs.new_release_tag }} "$asset_path" --clobber
          done <<< "${{ steps.public_assets.outputs.asset_paths }}"
        shell: bash
